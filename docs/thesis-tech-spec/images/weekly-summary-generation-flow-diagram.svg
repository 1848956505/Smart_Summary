<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1200" viewBox="0 0 980 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#000"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 24px; font-weight: 700; fill: #000; }
      .label { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 16px; font-weight: 700; fill: #000; }
      .text { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 14px; fill: #000; }
      .small { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 13px; fill: #000; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.9; rx: 14; ry: 14; }
      .decision { fill: #fff; stroke: #000; stroke-width: 1.9; }
      .line { stroke: #000; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="490" y="40" text-anchor="middle" class="title">周报生成流程图</text>

  <rect x="345" y="78" width="290" height="46" class="box"/>
  <text x="490" y="108" text-anchor="middle" class="label">用户选择目标周记录</text>

  <rect x="312" y="165" width="356" height="58" class="box"/>
  <text x="490" y="191" text-anchor="middle" class="label">系统查询该周记录下全部工作碎片</text>
  <text x="490" y="213" text-anchor="middle" class="small">MemoFragmentService.listByWeekRecordId</text>

  <polygon points="490,268 625,328 490,388 355,328" class="decision"/>
  <text x="490" y="323" text-anchor="middle" class="label">是否存在</text>
  <text x="490" y="345" text-anchor="middle" class="label">工作碎片</text>

  <rect x="112" y="304" width="155" height="48" class="box"/>
  <text x="189" y="334" text-anchor="middle" class="small">返回错误信息</text>

  <rect x="275" y="432" width="430" height="62" class="box"/>
  <text x="490" y="458" text-anchor="middle" class="label">按日期与排序号组织原始内容</text>
  <text x="490" y="481" text-anchor="middle" class="small">提取日期、状态、标签、标题和内容</text>

  <rect x="242" y="535" width="496" height="66" class="box"/>
  <text x="490" y="561" text-anchor="middle" class="label">拼接项目名、岗位、周时间范围等上下文信息</text>
  <text x="490" y="584" text-anchor="middle" class="small">buildWeeklySummaryInput</text>

  <rect x="300" y="642" width="380" height="58" class="box"/>
  <text x="490" y="668" text-anchor="middle" class="label">构造模型输入文本</text>
  <text x="490" y="690" text-anchor="middle" class="small">形成周报生成提示内容</text>

  <rect x="272" y="742" width="436" height="62" class="box"/>
  <text x="490" y="768" text-anchor="middle" class="label">调用 LlmService.generateWeeklySummary</text>
  <text x="490" y="791" text-anchor="middle" class="small">构造请求体并访问大语言模型服务</text>

  <rect x="325" y="845" width="330" height="50" class="box"/>
  <text x="490" y="876" text-anchor="middle" class="label">获取模型输出结果</text>

  <rect x="248" y="936" width="484" height="60" class="box"/>
  <text x="490" y="962" text-anchor="middle" class="label">写入 memo_week_records.summary_content</text>
  <text x="490" y="985" text-anchor="middle" class="small">更新周记录中的总结正文与状态</text>

  <rect x="228" y="1037" width="524" height="64" class="box"/>
  <text x="490" y="1063" text-anchor="middle" class="label">写入 summary_records</text>
  <text x="490" y="1086" text-anchor="middle" class="small">保存总结文本、原始输入、模型参数快照与来源周记录标识</text>

  <rect x="355" y="1140" width="270" height="44" class="box"/>
  <text x="490" y="1168" text-anchor="middle" class="label">返回生成结果给前端</text>

  <line x1="490" y1="124" x2="490" y2="165" class="line"/>
  <line x1="490" y1="223" x2="490" y2="268" class="line"/>
  <line x1="490" y1="388" x2="490" y2="432" class="line"/>
  <line x1="490" y1="494" x2="490" y2="535" class="line"/>
  <line x1="490" y1="601" x2="490" y2="642" class="line"/>
  <line x1="490" y1="700" x2="490" y2="742" class="line"/>
  <line x1="490" y1="804" x2="490" y2="845" class="line"/>
  <line x1="490" y1="895" x2="490" y2="936" class="line"/>
  <line x1="490" y1="996" x2="490" y2="1037" class="line"/>
  <line x1="490" y1="1101" x2="490" y2="1140" class="line"/>
  <line x1="355" y1="328" x2="267" y2="328" class="line"/>

  <text x="382" y="404" class="small">是</text>
  <text x="300" y="316" class="small">否</text>
</svg>
