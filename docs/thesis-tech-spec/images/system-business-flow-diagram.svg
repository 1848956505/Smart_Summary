<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1180" viewBox="0 0 980 1180">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#000"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 24px; font-weight: 700; fill: #000; }
      .label { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 16px; font-weight: 700; fill: #000; }
      .text { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 15px; fill: #000; }
      .small { font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif; font-size: 13px; fill: #000; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.9; rx: 14; ry: 14; }
      .decision { fill: #fff; stroke: #000; stroke-width: 1.9; }
      .line { stroke: #000; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #000; stroke-width: 1.6; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="490" y="40" text-anchor="middle" class="title">系统业务流程图</text>

  <rect x="360" y="70" width="260" height="44" class="box"/>
  <text x="490" y="98" text-anchor="middle" class="label">用户登录系统</text>

  <rect x="335" y="160" width="310" height="52" class="box"/>
  <text x="490" y="182" text-anchor="middle" class="label">加载用户基础信息与模型配置</text>
  <text x="490" y="203" text-anchor="middle" class="small">前端保存登录态并传递用户上下文</text>

  <polygon points="490,255 620,315 490,375 360,315" class="decision"/>
  <text x="490" y="311" text-anchor="middle" class="label">创建或选择</text>
  <text x="490" y="332" text-anchor="middle" class="label">文件夹</text>

  <polygon points="490,425 620,485 490,545 360,485" class="decision"/>
  <text x="490" y="481" text-anchor="middle" class="label">创建或选择</text>
  <text x="490" y="502" text-anchor="middle" class="label">周记录</text>

  <rect x="310" y="590" width="360" height="70" class="box"/>
  <text x="490" y="617" text-anchor="middle" class="label">录入并维护工作碎片</text>
  <text x="490" y="640" text-anchor="middle" class="small">日期、标题、内容、状态、优先级、标签</text>

  <polygon points="490,708 640,770 490,832 340,770" class="decision"/>
  <text x="490" y="764" text-anchor="middle" class="label">是否触发</text>
  <text x="490" y="786" text-anchor="middle" class="label">周报生成</text>

  <rect x="278" y="870" width="424" height="62" class="box"/>
  <text x="490" y="896" text-anchor="middle" class="label">聚合该周全部工作碎片并构造模型输入</text>
  <text x="490" y="918" text-anchor="middle" class="small">拼接项目名、岗位信息、时间范围等上下文</text>

  <rect x="350" y="970" width="280" height="50" class="box"/>
  <text x="490" y="1001" text-anchor="middle" class="label">调用大语言模型生成总结结果</text>

  <rect x="250" y="1060" width="480" height="72" class="box"/>
  <text x="490" y="1087" text-anchor="middle" class="label">结果写回周记录并同步保存到历史记录</text>
  <text x="490" y="1110" text-anchor="middle" class="small">保存总结文本、模型参数快照与来源周记录标识</text>

  <rect x="748" y="1069" width="165" height="54" class="box"/>
  <text x="830" y="1092" text-anchor="middle" class="small">查看 / 复制 / 导出</text>
  <text x="830" y="1113" text-anchor="middle" class="small">回看与再次加工</text>

  <rect x="70" y="738" width="165" height="64" class="box"/>
  <text x="152" y="765" text-anchor="middle" class="small">继续补充或编辑</text>
  <text x="152" y="788" text-anchor="middle" class="small">工作碎片</text>

  <rect x="760" y="972" width="140" height="46" class="box"/>
  <text x="830" y="1001" text-anchor="middle" class="small">通用总结生成链路</text>

  <line x1="490" y1="114" x2="490" y2="160" class="line"/>
  <line x1="490" y1="212" x2="490" y2="255" class="line"/>
  <line x1="490" y1="375" x2="490" y2="425" class="line"/>
  <line x1="490" y1="545" x2="490" y2="590" class="line"/>
  <line x1="490" y1="660" x2="490" y2="708" class="line"/>
  <line x1="490" y1="832" x2="490" y2="870" class="line"/>
  <line x1="490" y1="932" x2="490" y2="970" class="line"/>
  <line x1="490" y1="1020" x2="490" y2="1060" class="line"/>
  <line x1="730" y1="1096" x2="748" y2="1096" class="line"/>
  <line x1="340" y1="770" x2="235" y2="770" class="line"/>
  <line x1="152" y1="738" x2="152" y2="625" class="dash"/>
  <line x1="152" y1="625" x2="310" y2="625" class="dash"/>
  <line x1="630" y1="995" x2="760" y2="995" class="dash"/>

  <text x="282" y="758" class="small">否</text>
  <text x="510" y="856" class="small">是</text>
  <text x="784" y="960" class="small">补充说明</text>
</svg>
