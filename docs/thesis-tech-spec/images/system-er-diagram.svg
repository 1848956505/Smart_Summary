<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .title {
        font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #000;
      }
      .entity {
        fill: #fff;
        stroke: #000;
        stroke-width: 2;
      }
      .relation {
        fill: #fff;
        stroke: #000;
        stroke-width: 2;
      }
      .name {
        font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;
        font-size: 17px;
        fill: #000;
      }
      .card {
        font-family: "Microsoft YaHei","Noto Sans SC",Arial,sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #000;
      }
      .line {
        stroke: #000;
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>

  <text x="590" y="42" text-anchor="middle" class="title">系统 E-R 图</text>

  <!-- 实体 -->
  <rect x="485" y="92" width="210" height="64" class="entity"/>
  <text x="590" y="131" text-anchor="middle" class="name">用户</text>

  <rect x="110" y="286" width="200" height="64" class="entity"/>
  <text x="210" y="325" text-anchor="middle" class="name">文件夹</text>

  <rect x="492" y="286" width="196" height="64" class="entity"/>
