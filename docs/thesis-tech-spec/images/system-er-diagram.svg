  <!-- 连线 -->
  <line x1="530" y1="156" x2="250" y2="200" class="line"/>
  <line x1="210" y1="276" x2="210" y2="286" class="line"/>

  <line x1="575" y1="156" x2="485" y2="200" class="line"/>
  <line x1="470" y1="276" x2="565" y2="286" class="line"/>

