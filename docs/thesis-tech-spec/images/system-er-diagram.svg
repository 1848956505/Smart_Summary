  <polygon points="470,200 535,238 470,276 405,238" class="relation"/>
  <text x="470" y="245" text-anchor="middle" class="name">拥有</text>

  <polygon points="710,200 775,238 710,276 645,238" class="relation"/>
  <text x="710" y="245" text-anchor="middle" class="name">拥有</text>

  <polygon points="950,200 1015,238 950,276 885,238" class="relation"/>
  <text x="950" y="245" text-anchor="middle" class="name">拥有</text>

  <polygon points="395,406 460,444 395,482 330,444" class="relation"/>
  <text x="395" y="451" text-anchor="middle" class="name">包含</text>

  <polygon points="780,406 845,444 780,482 715,444" class="relation"/>
  <text x="780" y="451" text-anchor="middle" class="name">包含</text>

  <polygon points="705,512 770,550 705,588 640,550" class="relation"/>
